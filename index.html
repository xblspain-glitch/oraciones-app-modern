<!DOCTYPE html>
<html lang="es">
<head>
<!-- V8.0 CATEGORIAS DINAMICAS -->
<!-- V7.8 BOTON REF EN BARRA -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Oraciones Modern</title>
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oraciones Modern">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#f8f6f1;--card:#ffffff;--text:#181818;--muted:#6b665d;--line:#e5dece;--primary:#8a5a2b;--soft:#efe7da;--danger:#b84a3c;--accent:#c59763}
body.dark{--bg:#111111;--card:#1a1a1a;--text:#f2eee7;--muted:#b5ab9c;--line:#2f2a24;--primary:#c89763;--soft:#24211d;--danger:#d56d61;--accent:#ffd27d}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea{font-family:inherit}
.topbar{position:sticky;top:0;z-index:40;padding:calc(8px + env(safe-area-inset-top)) 10px 8px;background:rgba(248,246,241,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
body.dark .topbar{background:rgba(17,17,17,.96)}
.topbar-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border:none;border-radius:14px;padding:10px 12px;font-size:14px;cursor:pointer}
.btn.primary{background:var(--primary);color:#fff}
.btn.soft{background:var(--soft);color:var(--text)}
.btn.danger{background:var(--danger);color:#fff}
.segment{display:flex;gap:6px;background:var(--soft);padding:4px;border-radius:14px}
.segment button{border:none;background:transparent;padding:8px 12px;border-radius:10px;cursor:pointer}
.segment button.active{background:var(--card);font-weight:bold}
.search{flex:1;min-width:180px;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:14px;padding:10px 12px;font-size:15px}
.counter{font-size:13px;color:var(--muted);padding:0 2px}
.main{display:grid;grid-template-columns:300px 1fr;min-height:calc(100dvh - 68px)}
.sidebar{border-right:1px solid var(--line);overflow:auto;background:var(--bg);padding:10px}
.list{display:flex;flex-direction:column;gap:8px}
.item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;cursor:pointer}
.item.active{outline:2px solid var(--primary)}
.item-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.item-title{font-weight:bold;margin-bottom:4px}
.item-code{font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:6px}
.item-sub{color:var(--muted);font-size:13px}
.fav{color:var(--accent);font-size:18px}
.content{min-width:0;overflow:auto;padding:12px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;min-height:calc(100dvh - 92px);display:flex;flex-direction:column;overflow:hidden}
.panel-head{position:sticky;top:0;z-index:3;display:flex;gap:8px;flex-wrap:wrap;padding:10px;border-bottom:1px solid var(--line);background:var(--card)}
.reader-code{font-size:13px;color:var(--muted);font-weight:bold;padding:16px 18px 0}
.reader-title{font-size:24px;font-weight:bold;padding:6px 18px 0}
.reader-text{white-space:pre-wrap;padding:18px 18px 40px;font-size:24px;line-height:2.05}
.title-input{width:100%;border:none;border-bottom:1px solid var(--line);outline:none;background:var(--card);color:var(--text);font-size:22px;font-weight:bold;padding:14px 16px}
.text-input,.backup-text{flex:1;width:100%;border:none;outline:none;resize:none;background:var(--card);color:var(--text);font-size:18px;line-height:1.7;padding:18px;min-height:50dvh}
.hidden{display:none!important}
.empty{color:var(--muted);padding:18px}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:95}
.toast.show{opacity:1}
.title-list{padding:12px;display:flex;flex-direction:column;gap:8px}.title-row{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;gap:10px;align-items:center;cursor:pointer}.title-row.active{outline:2px solid var(--primary)}.title-code{min-width:42px;color:var(--muted);font-weight:bold;font-size:13px}.title-name{font-weight:bold;line-height:1.35}.trash-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.trash-item{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:12px}
.trash-title{font-weight:bold;margin-bottom:8px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.small-note{color:var(--muted);font-size:13px;padding:0 18px 18px}
.status{color:var(--muted);font-size:13px;padding:10px 12px;margin-left:auto}
.install-banner{position:fixed;left:10px;right:10px;bottom:10px;z-index:100;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.install-title{font-weight:bold;margin-bottom:6px}
.install-sub{color:var(--muted);font-size:13px;margin-bottom:10px}
.file-row{display:flex;gap:8px;flex-wrap:wrap;padding:0 18px 12px}
.file-input{display:none}
.fullscreen-reading .topbar,.fullscreen-reading .sidebar{display:none!important}
.fullscreen-reading .main{grid-template-columns:1fr;min-height:100dvh}
.fullscreen-reading .content{padding:0}
.fullscreen-reading .panel{border:none;border-radius:0;min-height:100dvh}
.fullscreen-reading .panel-head{position:sticky;top:0;padding:calc(8px + env(safe-area-inset-top)) 10px 8px;border-radius:0}
.fullscreen-reading .reader-code{font-size:13px;padding:16px 16px 0}
.fullscreen-reading .reader-title{font-size:22px;padding:6px 16px 0}
.fullscreen-reading .reader-text{font-size:25px;line-height:2.1;padding:16px 16px 48px;min-height:100dvh}
.fullscreen-reading.hide-reading-ui .panel-head{opacity:0;pointer-events:none;transform:translateY(-12px)}
@media (display-mode: standalone){
  body .topbar{padding-top:calc(14px + env(safe-area-inset-top))}
  body .panel{border-radius:0;border:none}
  body .content{padding:0}
}
@media (max-width:860px){
  .main{grid-template-columns:1fr}
  .sidebar{display:block;border-right:none;border-bottom:1px solid var(--line);max-height:34dvh}
  body.reading-mobile .sidebar{display:none}
  .content{padding:0}
  .panel{border:none;border-radius:0;min-height:calc(100dvh - 62px)}
  .panel-head{padding:8px;border-radius:0}
  .reader-code{font-size:13px;padding:14px 16px 0}
  .reader-title{font-size:22px;padding:6px 16px 0}
  .reader-text{font-size:23px;line-height:2;padding:16px 16px 34px}
  .text-input,.backup-text{font-size:18px;line-height:1.7;min-height:56dvh}
  .search{order:2;width:100%;flex-basis:100%}
  .status{width:100%;margin-left:0;padding-top:0}
}
body.dark .segment button{color:var(--text)}body.dark .segment button.active{color:var(--text)}
.category-grid{padding:12px;display:flex;flex-direction:column;gap:10px}
.category-card{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;font-weight:bold}
.category-count{color:var(--muted);font-size:13px;margin-top:4px}

#readerText{font-size:var(--reader-font-size, 28px) !important}

#editorView .panel-head{
  position:sticky;
  top:0;
  z-index:30;
  background:var(--panel);
  border-bottom:1px solid var(--line);
}
#editorView textarea{
  min-height:60vh;
}

#editorView{padding-bottom:90px}

.vdaily-note{
  display:inline-block;
  margin: 8px 0 4px 0;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(166, 107, 45, 0.10);
  color: #7b552f;
  font-weight: 600;
  font-size: 0.92rem;
}


.reader-daily-date{
  padding: 0 18px 4px;
  color: var(--muted);
  font-weight: 700;
  font-size: 15px;
}
.reader-daily-date.hidden{display:none}

</style>

<style>
body.titles-only .sidebar{display:none!important;}
body.titles-only .content{width:100%!important;max-width:100%!important;}
</style>


<style>
body.backup-only .sidebar{display:none!important;}
body.backup-only .content{width:100%!important;max-width:100%!important;}
</style>



<style>
.more-dropdown{
  position:absolute;
  z-index:99999;
  background:var(--card,#fff);
  border:1px solid rgba(0,0,0,.10);
  border-radius:14px;
  box-shadow:0 8px 22px rgba(0,0,0,.18);
  padding:6px;
  width:max-content;
  min-width:190px;
  max-width:240px;
}
.more-dropdown button{
  display:block;
  width:100%;
  border:0;
  background:transparent;
  text-align:left;
  font:inherit;
  font-size:18px;
  padding:10px 12px;
  border-radius:10px;
  color:var(--text,#222);
  white-space:nowrap;
}
.more-dropdown button:active,
.more-dropdown button:hover{
  background:var(--soft,#f3eee4);
}
</style>


<style>
.send-stats-panel{
  position:fixed;
  z-index:100000;
  left:12px;
  right:12px;
  top:92px;
  max-width:520px;
  margin:0 auto;
  background:var(--panel,#fff);
  border:1px solid rgba(0,0,0,.10);
  border-radius:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.20);
  padding:12px;
}
.send-stats-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-weight:800;
  font-size:18px;
  margin-bottom:8px;
}
.send-stats-close{
  border:0;
  border-radius:999px;
  padding:4px 10px;
  background:var(--soft,#f3eee4);
  font-size:18px;
}
.send-stats-summary{
  opacity:.75;
  font-size:14px;
  margin:0 0 8px 0;
}
.send-stats-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:8px 6px;
  border-top:1px solid rgba(0,0,0,.06);
}
.send-stats-cat{
  font-weight:650;
}
.send-stats-counts{
  opacity:.78;
  white-space:nowrap;
  font-size:14px;
}
</style>


<style>
.modern-home{
  min-height:100vh;
  padding:22px 16px 34px;
  background:
    radial-gradient(circle at top left, rgba(125,94,42,.18), transparent 38%),
    linear-gradient(180deg, var(--bg,#f8f2e8), var(--bg,#f8f2e8));
}
.modern-home.hidden{display:none!important;}
.modern-hero{
  max-width:680px;
  margin:0 auto 18px;
  padding:20px 18px;
  border-radius:28px;
  background:var(--panel,#fff);
  box-shadow:0 8px 28px rgba(0,0,0,.10);
  border:1px solid rgba(0,0,0,.06);
}
.modern-hero-title{
  font-size:30px;
  font-weight:850;
  line-height:1.1;
  margin:0 0 8px;
}
.modern-hero-sub{
  opacity:.72;
  font-size:16px;
  line-height:1.35;
}
.modern-grid{
  max-width:680px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr;
  gap:13px;
}
.modern-card{
  border:0;
  width:100%;
  text-align:left;
  border-radius:24px;
  padding:18px 18px;
  background:var(--panel,#fff);
  color:var(--text,#222);
  box-shadow:0 7px 22px rgba(0,0,0,.09);
  border:1px solid rgba(0,0,0,.06);
}
.modern-card-main{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.modern-card-title{
  font-size:24px;
  font-weight:850;
}
.modern-card-count{
  font-size:15px;
  opacity:.7;
  margin-top:7px;
}
.modern-card-arrow{
  font-size:26px;
  opacity:.45;
}
.modern-tools{
  background:linear-gradient(135deg, rgba(54,74,103,.12), rgba(255,255,255,.85));
}
.modern-home .modern-card:active{
  transform:scale(.985);
}
@media (min-width:640px){
  .modern-grid{grid-template-columns:1fr 1fr;}
  .modern-card.tools-wide{grid-column:1 / -1;}
}
</style>


<style>
/* Oraciones Modern V1.2: inicio limpio y compacto */
.modern-home{
  padding-top:28px!important;
}
.modern-grid{
  gap:12px!important;
}
.modern-card{
  padding:15px 16px!important;
  border-radius:22px!important;
}
.modern-card-title{
  font-size:23px!important;
}
.modern-card-count{
  margin-top:5px!important;
  font-size:15px!important;
}
.modern-card-arrow{
  font-size:25px!important;
}
</style>


<style>
/* Oraciones V2 CSS v1 - solo pulido visual, sin tocar lógica */
.topbar-row{
  gap:9px!important;
}

.btn{
  border-radius:999px!important;
  padding:9px 13px!important;
  box-shadow:0 4px 12px rgba(0,0,0,.055)!important;
}

.btn.soft{
  background:rgba(239,232,218,.92)!important;
}

.btn.primary{
  border-radius:999px!important;
  box-shadow:0 6px 16px rgba(123,78,32,.20)!important;
}

.segment{
  border-radius:24px!important;
  padding:5px!important;
  gap:4px!important;
}

.segment button{

  padding:11px 13px!important;
}

.search{
  margin-top:4px!important;

}

.panel-head{

}

.panel-head .btn{

}

}

  }

</head>
<body>
<div id="installBanner" class="install-banner hidden">
  <div class="install-title">Instalar app</div>
  <div id="installHelp" class="install-sub">Puedes instalarla para abrirla como app real desde tu móvil.</div>
  <div class="row">
    <button class="btn primary" id="installBtn" type="button">Instalar</button>
    <button class="btn soft" type="button" onclick="dismissInstall()">Ahora no</button>
  </div>
</div>


<div id="modernHomeView" class="modern-home hidden">
  <div class="modern-grid">
    <button class="modern-card" type="button" onclick="enterModernSection('prayers')">
      <div class="modern-card-main">
        <div>
          <div class="modern-card-title">✝️ Oraciones</div>
          <div id="modernCountPrayers" class="modern-card-count">0 elementos</div>
        </div>
        <div class="modern-card-arrow">›</div>
      </div>
    </button>

    <button class="modern-card" type="button" onclick="enterModernSection('notes')">
      <div class="modern-card-main">
        <div>
          <div class="modern-card-title">📝 Notas</div>
          <div id="modernCountNotes" class="modern-card-count">0 elementos</div>
        </div>
        <div class="modern-card-arrow">›</div>
      </div>
    </button>

    <button class="modern-card" type="button" onclick="enterModernSection('guides')">
      <div class="modern-card-main">
        <div>
          <div class="modern-card-title">📜 Guía</div>
          <div id="modernCountGuides" class="modern-card-count">0 elementos</div>
        </div>
        <div class="modern-card-arrow">›</div>
      </div>
    </button>

    <button class="modern-card" type="button" onclick="enterModernSection('verses')">
      <div class="modern-card-main">
        <div>
          <div class="modern-card-title">❤️ Versículos</div>
          <div id="modernCountVerses" class="modern-card-count">0 elementos</div>
        </div>
        <div class="modern-card-arrow">›</div>
      </div>
    </button>

    <button class="modern-card modern-tools tools-wide" type="button" onclick="enterModernTools()">
      <div class="modern-card-main">
        <div>
          <div class="modern-card-title">⚙️ Herramientas</div>
          <div class="modern-card-count">Backup, importar y exportar</div>
        </div>
        <div class="modern-card-arrow">›</div>
      </div>
    </button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-row">
    <button class="btn soft" type="button" onclick="openModernHome()">🏠 Inicio</button>
    <div class="segment">
      <button id="tabPrayers" class="active" type="button" onclick="switchSection('prayers')">✝️ Oraciones</button>
      <button id="tabNotes" type="button" onclick="switchSection('notes')">📝 Notas</button>
      <button id="tabGuides" type="button" onclick="switchSection('guides')">📜 Guía</button>
      <button id="tabVerses" type="button" onclick="switchSection('verses')">❤️ Versículos</button>
    </div>
    <button class="btn primary" type="button" onclick="newItem()">➕ Nueva</button>
    <button class="btn soft" type="button" onclick="enterFullscreenReading()">📖 Leer</button>
    <button class="btn soft" type="button" onclick="openDailyVerse()">🌅 Versículo del día</button>
    <button class="btn soft" type="button" onclick="openRandomVerse()">🎲 Aleatorio</button>
    <button class="btn soft" type="button" onclick="openVerseCategories()">🗂️ Categorías</button>
        <button class="btn soft" type="button" onclick="openTitlesView()">📑 Títulos</button>
    <button class="btn soft" type="button" onclick="openEditor()">✍️ Editar</button>
    <button class="btn soft" type="button" onclick="openFavoritesView()">⭐ Favoritos</button>
    <button class="btn soft" type="button" onclick="openBackup()">☁️ Backup</button>
    <button class="btn soft" type="button" onclick="openTrash()">🗑️ Papelera</button>
    <button class="btn soft" type="button" onclick="toggleTheme()">🌙</button>
    <button class="btn danger" type="button" onclick="moveToTrash()">🗑️ Eliminar</button>
    <input id="search" class="search" placeholder="Buscar..." oninput="renderList()">
    <div id="counterInfo" class="counter"></div>
  </div>
</div>

<div class="main">
  <aside class="sidebar"><div id="list" class="list"></div></aside>
  <section class="content">
    <div id="readerView" class="panel">
      <div class="panel-head">
        <button class="btn soft" type="button" onclick="smartBack()">← Volver</button>
        <button class="btn soft" type="button" onclick="openList()">☰ Lista</button>
        <button class="btn soft" type="button" onclick="openTitlesView()">📑 Títulos</button>
        <button class="btn soft" type="button" onclick="openEditor()">✍️ Editar</button>
        <button class="btn soft" type="button" onclick="changeReaderFont(-2)">A-</button>
        <button class="btn soft" type="button" onclick="changeReaderFont(2)">A+</button>
        <button class="btn soft" type="button" onclick="copyCurrentReference()">📋 Ref</button>
        <button class="btn soft" type="button" onclick="copyCurrent()">📋 Copiar</button><button class="btn soft" type="button" onclick="moveVerseToCategory()">📂 Mover</button>
        <button class="btn soft" type="button" data-more-button="1" onclick="openMoreMenu(event)">📖 Más</button>
        
        
        
        <button class="btn soft" type="button" onclick="shareCurrent()">🔗 Compartir</button>
        <button class="btn soft" type="button" onclick="markCurrentVerseCardSentDirect(); shareVerseCard()">🖼️ Tarjeta</button>
        <button class="btn soft" type="button" onclick="toggleFavorite()">⭐</button>
        <button class="btn soft" type="button" onclick="exportCurrentHTML()">🌐 Exportar lectura</button>
      </div>
      <div id="readerCode" class="reader-code"></div>
      <div id="readerDailyDate" class="reader-daily-date hidden"></div>
      <div id="readerTitle" class="reader-title"></div>
      <div id="readerText" class="reader-text" onclick="toggleReadingUI()"></div>
    </div>

    <div id="editorView" class="panel hidden">
      <div class="panel-head">
        <button class="btn primary" type="button" onclick="saveCurrent(true,false)">💾 Guardar</button>
        <button class="btn primary" type="button" onclick="saveCurrent(false,false)">✅ Guardar y volver</button>
        <button class="btn soft" type="button" onclick="leaveEditor()">← Volver</button>
        <div id="saveStatus" class="status">Sin cambios</div>
      </div>
      <input id="editTitle" class="title-input" placeholder="Título">
      
      <select id="editCategory" class="search hidden" style="width:100%;border-radius:0;border:none;border-bottom:1px solid var(--line);font-size:18px">
        <option value="salvacion">❤️ Salvación</option>
        <option value="fe">🙏🏾 Fe</option>
        <option value="esperanza">🕊️ Esperanza</option>
        <option value="fortaleza">💪🏾 Fortaleza</option>
        <option value="amor">❤️ Amor</option>
        <option value="descanso">🌿 Descanso</option>
        <option value="sabiduria">📚 Sabiduría</option>
        <option value="alabanza">🙌🏾 Alabanza</option>
        <option value="santidad">⚖️ Santidad</option>
        <option value="reino">👑 Reino de Dios</option>
        <option value="espiritu">🔥 Espíritu Santo</option>
        <option value="segunda_venida">⏳ Segunda Venida</option>
        <option value="juicio">⚖️ Juicio</option>
        <option value="matrimonio">🤝 Matrimonio</option>
      </select>

      <textarea id="editText" class="text-input" placeholder="Escribe aquí..."></textarea>
    </div>

    <div id="backupView" class="panel hidden">
      <div class="panel-head">
        <button class="btn soft" type="button" onclick="openReader()">← Volver</button>
        <button class="btn primary" type="button" onclick="downloadBackupJson()">⬇ Descargar JSON</button>
        <button class="btn soft" type="button" onclick="shareBackupJson()">📤 Compartir JSON</button>

    if(!main || document.querySelector(".vdaily-note")) return;

        .find(el => (el.innerText || "").includes("Versículo del día"));

<script>
let categoryListActive=false;

let sentListActive=false;

const STORAGE_KEY="oraciones_full_numeracion_v1";
const AUTO_BACKUP_KEY="oraciones_full_numeracion_auto_backup_v1";
const THEME_KEY="oraciones_full_numeracion_theme_v1";
const SIZE_KEY="oraciones_full_numeracion_reader_size_v1";
const INSTALL_DISMISSED_KEY="oraciones_install_dismiss_v92f";
let deferredPrompt=null;
let readerSize=parseInt(localStorage.getItem(SIZE_KEY)||"24",10);
let returnToSentList=false;
let section="prayers";
let state={"section":"prayers","currentPrayerId":null,"currentNoteId":null,"prayers":[],"notes":[],"trashPrayers":[],"trashNotes":[],"guides":[],"trashGuides":[],"currentGuideId":null,"verses":[],"trashVerses":[],"currentVerseId":null};
let isDirty=false;
let autosaveTimer=null;
const seedPrayer="\ud83c\udf05 \u271d\ufe0f Oraci\u00f3n diaria completa\n\nSe\u00f1or Dios Todopoderoso,\ndamos gracias por este nuevo d\u00eda que me concede.\n\nDamos gracias por la vida que me ha dado,\npor el regalo de la vida, desde la creaci\u00f3n y el nacimiento,\nhasta el regalo de la vida eterna.\n\nPor ser el centro de mi vida,\npor llevar las riendas de mi vida\ny darle sentido.\n";
const seedNote="Aqu\u00ed puedes guardar ideas, reflexiones, vers\u00edculos sueltos o recordatorios.";
function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove("show"),1300)}
function setSaveStatus(msg){const el=document.getElementById("saveStatus");if(el) el.textContent=msg}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function buildInitialState(){const prayerId=uid(),noteId=uid();return {"section":"prayers","currentPrayerId":prayerId,"currentNoteId":noteId,"prayers":[{"id":prayerId,"title":"🌅 ✝️ Oración diaria completa","content":seedPrayer,"updatedAt":Date.now(),"favorite":true}],"notes":[{"id":noteId,"title":"📝 Mi primera nota","content":seedNote,"updatedAt":Date.now(),"favorite":false}],"trashPrayers":[],"trashNotes":[],"guides":[],"trashGuides":[],"currentGuideId":null,"verses":[],"trashVerses":[],"currentVerseId":null}}


const VERSE_CATEGORIES=[
  {id:"salvacion",label:"❤️ Salvación"},
  {id:"fe",label:"🙏🏾 Fe"},
  {id:"esperanza",label:"🕊️ Esperanza"},
  {id:"fortaleza",label:"💪🏾 Fortaleza"},
  {id:"amor",label:"❤️ Amor"},
  {id:"descanso",label:"🌿 Descanso"},
  {id:"sabiduria",label:"📚 Sabiduría"},
  {id:"alabanza",label:"🙌🏾 Alabanza"},
  {id:"santidad",label:"⚖️ Santidad"},
  {id:"reino",label:"👑 Reino de Dios"},
  {id:"espiritu",label:"🔥 Espíritu Santo"},
  {id:"segunda_venida",label:"⏳ Segunda Venida"},
  {id:"juicio",label:"⚖️ Juicio"},
  {id:"matrimonio",label:"🤝 Matrimonio"}
];
let currentVerseCategory="fe";
let verseNavigationMode="categories";
let specialVerseMode=null;
function verseCategoryLabel(id){
  if(!id) return "📖 Sin categoría";
  const dynamicCats = (state && Array.isArray(state.verseCategories)) ? state.verseCategories : [];
  const c = dynamicCats.find(x=>x.id===id) || VERSE_CATEGORIES.find(x=>x.id===id);
  return c ? c.label : "📖 Sin categoría";
}
function normalizeVerses(){
  if(!Array.isArray(state.verses)) state.verses=[];
  if(!Array.isArray(state.trashVerses)) state.trashVerses=[];
  state.verses=state.verses.map(v=>({
    id:v.id||uid(),
    reference:v.reference||v.title||"Nueva referencia",
    title:v.title||v.reference||"Nueva referencia",
    category:v.category||"fe",
    content:v.content||v.text||"",
    text:v.text||v.content||"",
    updatedAt:v.updatedAt||Date.now(),
    favorite:!!v.favorite,
    shared:!!v.shared,
    lastCardSentAt:v.lastCardSentAt||0
  }));
  state.trashVerses=state.trashVerses.map(v=>({
    ...v,
    reference:v.reference||v.title||"Nueva referencia",
    title:v.title||v.reference||"Nueva referencia",
    category:v.category||"fe",
    content:v.content||v.text||"",
    text:v.text||v.content||"",
    favorite:!!v.favorite,
    shared:!!v.shared,
    lastCardSentAt:v.lastCardSentAt||0
  }));
  if(!state.currentVerseId && state.verses.length) state.currentVerseId=state.verses[0].id;
}

function normalizeGuides(){
  if(!Array.isArray(state.guides)) state.guides=[];
  if(!Array.isArray(state.trashGuides)) state.trashGuides=[];
  if(!state.currentGuideId && state.guides.length) state.currentGuideId=state.guides[0].id;
  normalizeVerses();
}


function cleanTextBreaks(t){
  return String(t || "").replace(/\\n/g, "\n");
}

function cleanAllVerseBreaks(){
  try{
    if(!state || !Array.isArray(state.verses)) return;
    state.verses.forEach(v=>{
      ["ref","reference","title","text","body","content"].forEach(k=>{
        if(typeof v[k] === "string") v[k] = cleanTextBreaks(v[k]);
      });
    });
  }catch(e){}
}

function saveState(){
 cleanAllVerseBreaks();localStorage.setItem(STORAGE_KEY, JSON.stringify(state));const backup={"exportedAt":new Date().toISOString(),...state};localStorage.setItem(AUTO_BACKUP_KEY, JSON.stringify(backup))}
function loadState(){const raw=localStorage.getItem(STORAGE_KEY);if(raw){try{state=JSON.parse(raw);if(!state||!Array.isArray(state.prayers)||!Array.isArray(state.notes)) throw new Error("bad")}catch(e){state=buildInitialState();saveState()}}else{state=buildInitialState();saveState()}section=state.section||"prayers";normalizeGuides()}

function exportVersesOnly(){
  normalizeVerses();
  const payload={type:"verses",exportedAt:new Date().toISOString(),verses:state.verses,trashVerses:state.trashVerses||[]};
  const text=JSON.stringify(payload,null,2);
  document.getElementById("backupText").value=text;
  downloadBlob("versiculos_app.json", new Blob([text],{type:"application/json;charset=utf-8"}));
  toast("Versículos exportados");
}
function applyVersesImport(parsed){
  if(!parsed || parsed.type!=="verses" || !Array.isArray(parsed.verses)) throw new Error("bad_verses_json");
  if(!confirm("¿Importar versículos sin tocar oraciones, notas ni guía?")) return false;
  state.verses=parsed.verses;
  state.trashVerses=Array.isArray(parsed.trashVerses)?parsed.trashVerses:[];
  normalizeVerses();
  saveState();
  section="verses";state.section="verses";
  syncTabs();renderList();openVerseCategories();
  toast("Versículos importados: "+state.verses.length);
  return true;
}
function importVersesOnly(){
  const text=document.getElementById("backupText").value.trim();
  if(!text) return alert("Pega primero un JSON de versículos o usa ❤️ Importar archivo de versículos.");
  try{
    applyVersesImport(JSON.parse(text));
  }catch(e){alert("JSON de versículos no válido.")}
}
function importVersesFromFile(file){
  if(!file) return alert("No se ha seleccionado ningún archivo.");
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const text=String(reader.result||"");
      document.getElementById("backupText").value=text;
      applyVersesImport(JSON.parse(text));
    }catch(e){alert("El archivo no es un JSON de versículos válido.")}
  };
  reader.onerror=()=>alert("No se pudo leer el archivo.");
  reader.readAsText(file,"utf-8");
}
function openBackupFilePicker(){
  const input=document.getElementById("jsonFileInput");
  if(!input) return alert("Selector de archivo no disponible.");
  input.value="";
  input.click();
}
function openVersesFilePicker(){
  const input=document.getElementById("versesFileInput");
  if(!input) return alert("Selector de versículos no disponible.");
  input.value="";
  input.click();
}

function restoreAutoBackup(){const raw=localStorage.getItem(AUTO_BACKUP_KEY);if(!raw) return alert("No hay backup automático.");if(!confirm("¿Restaurar el backup automático?")) return;try{const parsed=JSON.parse(raw);state={"section":parsed.section||"prayers","currentPrayerId":parsed.currentPrayerId||null,"currentNoteId":parsed.currentNoteId||null,"currentGuideId":parsed.currentGuideId||null,"currentVerseId":parsed.currentVerseId||null,"prayers":Array.isArray(parsed.prayers)?parsed.prayers:[],"notes":Array.isArray(parsed.notes)?parsed.notes:[],"guides":Array.isArray(parsed.guides)?parsed.guides:[],"verses":Array.isArray(parsed.verses)?parsed.verses:[],"trashPrayers":Array.isArray(parsed.trashPrayers)?parsed.trashPrayers:[],"trashNotes":Array.isArray(parsed.trashNotes)?parsed.trashNotes:[],"trashGuides":Array.isArray(parsed.trashGuides)?parsed.trashGuides:[],"trashVerses":Array.isArray(parsed.trashVerses)?parsed.trashVerses:[]};normalizeGuides();saveState();section=state.section;syncTabs();renderList();renderReader();applyReaderFont();openReader();toast("Backup automático restaurado")}catch(e){alert("No se pudo restaurar.")}}
function applyTheme(){if(localStorage.getItem(THEME_KEY)==="dark") document.body.classList.add("dark")}
function toggleTheme(){document.body.classList.toggle("dark");localStorage.setItem(THEME_KEY, document.body.classList.contains("dark")?"dark":"light")}
function getDisplayCode(idx, kind){
  return (kind==="prayers"?"O":kind==="notes"?"N":kind==="guides"?"G":"V")+(idx+1)
}
function getCurrentCode(){
  const items=section==="prayers"?state.prayers:section==="notes"?state.notes:section==="guides"?state.guides:state.verses;
  const id=section==="prayers"?state.currentPrayerId:section==="notes"?state.currentNoteId:section==="guides"?state.currentGuideId:state.currentVerseId;
  const idx=items.findIndex(x=>x.id===id);
  return idx>=0?getDisplayCode(idx, section):"";
}
function syncTabs(){
  document.getElementById("tabPrayers").classList.toggle("active",section==="prayers");
  document.getElementById("tabNotes").classList.toggle("active",section==="notes");
  const guideTab=document.getElementById("tabGuides");if(guideTab)guideTab.classList.toggle("active",section==="guides");
  const verseTab=document.getElementById("tabVerses");if(verseTab)verseTab.classList.toggle("active",section==="verses");
  document.getElementById("search").placeholder=section==="prayers"?"Buscar oración o código (ej. O3)":section==="notes"?"Buscar nota o código (ej. N2)":section==="guides"?"Buscar guía o código (ej. G1)":"Buscar versículo, referencia o palabra";
  document.getElementById("counterInfo").textContent=`📖 ${state.prayers.length} | 📝 ${state.notes.length} | 📜 ${state.guides?state.guides.length:0} | ❤️ ${state.verses?state.verses.length:0}`;
}
function switchSection(s){
  section=s;state.section=s;saveState();syncTabs();renderList();
  if(s==="verses"){currentVerseCategory=currentVerseCategory||"fe";verseNavigationMode="categories";openVerseCategories();return}
  renderReader();openReader();
}
function getItems(){
  return section==="prayers"?state.prayers:section==="notes"?state.notes:section==="guides"?state.guides:state.verses
}
function setItems(items){
  if(section==="prayers") state.prayers=items;
  else if(section==="notes") state.notes=items;
  else if(section==="guides") state.guides=items;
  else state.verses=items;
}
function getTrash(){
  return section==="prayers"?state.trashPrayers:section==="notes"?state.trashNotes:section==="guides"?state.trashGuides:state.trashVerses
}
function setTrash(items){
  if(section==="prayers") state.trashPrayers=items;
  else if(section==="notes") state.trashNotes=items;
  else if(section==="guides") state.trashGuides=items;
  else state.trashVerses=items;
}
function currentItem(){
  normalizeGuides();
  const items=getItems();
  const id=section==="prayers"?state.currentPrayerId:section==="notes"?state.currentNoteId:section==="guides"?state.currentGuideId:state.currentVerseId;
  return items.find(x=>x.id===id)||items[0]||null;
}
function setCurrentId(id){
  if(section==="prayers") state.currentPrayerId=id;
  else if(section==="notes") state.currentNoteId=id;
  else if(section==="guides") state.currentGuideId=id;
  else state.currentVerseId=id;
  saveState();
}
function escapeHtml(str){return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function slugify(str){return String(str).normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w\s-]/g,"").trim().replace(/\s+/g,"-").toLowerCase() || "sin-titulo"}

function displayItemTitle(item){
  if(section==="verses") return (item.shared?"✓ ":"")+(item.favorite?"⭐ ":"")+(item.reference||item.title||"Sin referencia");
  return (item.favorite?"⭐ ":"")+(item.title||"Sin título");
}
function displayItemSub(item){
  if(section==="verses") return verseCategoryLabel(item.category)+" · "+((item.text||item.content||"").slice(0,70));
  return (item.content||"").slice(0,70);
}

function renderList(){const q=document.getElementById("search").value.trim().toLowerCase(),list=document.getElementById("list");list.innerHTML="";let items=[...getItems()].map((item, idx)=>({...item,__idx:idx,__code:getDisplayCode(idx, section)}));items=items.filter(item=>!q || item.title.toLowerCase().includes(q) || item.content.toLowerCase().includes(q) || item.__code.toLowerCase()===q);items.sort((a,b)=>(b.favorite===true)-(a.favorite===true)||b.updatedAt-a.updatedAt);if(!items.length){list.innerHTML='<div class="empty">No hay elementos.</div>';return}const current=currentItem();items.forEach(item=>{const div=document.createElement("div");div.className="item"+(current&&item.id===current.id?" active":"");const preview=item.content.trim().replace(/\n+/g," ").slice(0,70)||"Sin contenido";div.innerHTML='<div class="item-code">'+escapeHtml(item.__code)+'</div><div class="item-title-row"><div class="item-title">'+escapeHtml(item.title||"Sin título")+'</div><div class="fav">'+(item.favorite?'⭐':'')+'</div></div><div class="item-sub">'+escapeHtml(preview)+'</div>';div.onclick=()=>{if(!document.getElementById("editorView").classList.contains("hidden")) saveCurrent(false,true);specialVerseMode=null;setCurrentId(item.id);if(section==="verses"){currentVerseCategory=item.category||currentVerseCategory||"fe";verseNavigationMode="verse";}renderList();renderReader();openReader()};list.appendChild(div)})}

function applyReaderFont(){
  const size=state.readerFontSize||28;
  document.documentElement.style.setProperty("--reader-font-size", size+"px");
  const rt=document.getElementById("readerText");
  if(rt) rt.style.fontSize=size+"px";
}
function changeReaderFont(delta){
  state.readerFontSize=Math.max(18,Math.min(42,(state.readerFontSize||28)+delta));
  applyReaderFont();
  saveState();
}


function formatDailyDateEs(){
  try{
    return new Date().toLocaleDateString("es-ES", {
      weekday:"long",
      day:"numeric",
      month:"long",
      year:"numeric"
    });
  }catch(e){
    return new Date().toLocaleDateString();
  }
}




function renderReader(){applyReaderFont();
  const dailyDateEl=document.getElementById("readerDailyDate");
  if(dailyDateEl){dailyDateEl.classList.add("hidden");dailyDateEl.textContent="";}
  const item=currentItem();
  if(!item){
    document.getElementById("readerCode").textContent="";
    document.getElementById("readerTitle").textContent=section==="verses"?"❤️ Versículos":"";
    document.getElementById("readerText").textContent=section==="verses"?"Pulsa ❤️ Versículos para ver categorías o ➕ Nueva para añadir uno.":"";
    return;
  }
  if(section==="verses"){
    document.getElementById("readerCode").textContent=(item.shared?"✓ Compartido · ":"")+(specialVerseMode==="daily"?"🌅 Versículo del día · ":specialVerseMode==="random"?"🎲 Versículo aleatorio · ":"")+formatLastCardSentAt(item.lastCardSentAt)+" · "+verseCategoryLabel(item.category);
    if(specialVerseMode==="daily" && dailyDateEl){
      dailyDateEl.textContent="📅 "+formatDailyDateEs();
      dailyDateEl.classList.remove("hidden");
    }
    document.getElementById("readerTitle").textContent=(item.favorite?"⭐ ":"")+(item.reference||item.title||"Sin referencia");
    document.getElementById("readerText").textContent=item.text||item.content||"";
  }else{
    document.getElementById("readerCode").textContent=getCurrentCode();
    document.getElementById("readerTitle").textContent=(item.favorite?"⭐ ":"")+(item.title||"Sin título");
    document.getElementById("readerText").textContent=item.content;
  }
}


function setReturnToSentList(){
  try{ sessionStorage.setItem("returnToSentList","1"); }catch(e){}
}
function consumeReturnToSentList(){
  try{
    const v=sessionStorage.getItem("returnToSentList");
    if(v==="1"){
      sessionStorage.removeItem("returnToSentList");
      return true;
    }
  }catch(e){}
  return false;
}

function smartBack(){
  if(typeof categoryListActive !== "undefined" && categoryListActive){
    categoryListActive=false;
    try{
      section="verses";
      state.section="verses";
      if(typeof syncTabs==="function") syncTabs();
      if(typeof renderList==="function") renderList();
      if(typeof renderReader==="function") renderReader();
      if(typeof openReader==="function") openReader();
    }catch(e){}
    return;
  }

  if(typeof sentListActive !== "undefined" && sentListActive){
    sentListActive=false;
    try{
      section="verses";
      state.section="verses";
      if(typeof syncTabs==="function") syncTabs();
      if(typeof renderList==="function") renderList();
      if(typeof renderReader==="function") renderReader();
      if(typeof openReader==="function") openReader();
    }catch(e){}
    return;
  }

  if(consumeReturnToSentList()){
    openSentVersesList();
    return;
  }

  if(returnToSentList){
    returnToSentList=false;
    openSentVersesList();
    return;
  }

  if(section==="verses"){
    const readerVisible=!document.getElementById("readerView").classList.contains("hidden");
    const titlesVisible=!document.getElementById("titlesView").classList.contains("hidden");
    const catsVisible=!document.getElementById("verseCategoriesView").classList.contains("hidden");

    if(readerVisible){
      document.body.classList.remove("reading-mobile","fullscreen-reading","hide-reading-ui");
      if(currentVerseCategory){
        verseNavigationMode="category";
        renderVerseReferenceList(currentVerseCategory);
        setTimeout(()=>{
          const active=document.querySelector("#titlesList .title-row.active");
          if(active) active.scrollIntoView({block:"center"});
        },50);
        return;
      }
      verseNavigationMode="categories";
      openVerseCategories();
      return;
    }

    if(titlesVisible){
      verseNavigationMode="categories";
      openVerseCategories();
      return;
    }

    if(catsVisible){
      openReader();
      return;
    }
  }

  exitFullscreenReading();
}

function openReader(){
  clearNavModes();document.getElementById("readerView").classList.remove("hidden");document.getElementById("editorView").classList.add("hidden");document.getElementById("backupView").classList.add("hidden");document.getElementById("trashView").classList.add("hidden");document.getElementById("titlesView").classList.add("hidden");var vc=document.getElementById("verseCategoriesView");if(vc)vc.classList.add("hidden");document.body.classList.remove("fullscreen-reading","hide-reading-ui");if(window.innerWidth<=860) document.body.classList.add("reading-mobile");else document.body.classList.remove("reading-mobile")}
function openList(){
  clearNavModes();

function normalizeVerseDuplicateKey(s){
  return cleanTextBreaks(String(s||""))
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\brvr\s*1960\b/g,"")
    .replace(/\breina\s*valera\s*1960\b/g,"")
    .replace(/[–—]/g,"-")
    .replace(/[.,;:()\[\]{}"“”'’]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function extractReferenceFromPastedText(raw){
  const lines=String(raw||"").split(/\n+/).map(x=>x.trim()).filter(Boolean);
  const refRe=/^((?:[1-3]\s*)?(?:san\s+)?[a-záéíóúñü]+(?:\s+[a-záéíóúñü]+){0,3})\s+\d{1,3}:\d{1,3}(?:[-–—]\d{1,3})?/i;
  for(const line of lines){
    const clean=line.replace(/^[^\wáéíóúñü0-9]+/i,"").trim();
    const m=clean.match(refRe);
    if(m) return m[0].trim();
  }
  return "";
}

function removePastedHeadersForDuplicate(raw){
  let s=String(raw||"");
  const ref=extractReferenceFromPastedText(s);
  if(ref){
    s=s.replace(ref," ");
  }
  // Quita líneas tipo "❤️ Salvación", "🌅 Versículo del día", etc.
  s=s.split(/\n+/).filter(line=>{
    const t=line.trim();
    if(!t) return false;
    if(/^(❤️|🌿|✨|🙏🏾?|🙌🏾?|💪🏾?|🔥|👑|⏳|🕊️?|📖|🌅)/.test(t) && !/\[\d+\]/.test(t)) return false;
    if(/versículo del día/i.test(t)) return false;
    return true;
  }).join(" ");
  return s;
}

function findDuplicateVerseStrong(currentId, ref, body){
  const refCandidate = normalizeVerseDuplicateKey(ref) || normalizeVerseDuplicateKey(extractReferenceFromPastedText(body));
  const bodyKey = normalizeVerseDuplicateKey(removePastedHeadersForDuplicate(body));

  if(!Array.isArray(state.verses)) return null;

  return state.verses.find(v=>{
    if(v.id === currentId) return false;
    const vRefKey = normalizeVerseDuplicateKey(v.reference || v.title || "");
    const vBodyKey = normalizeVerseDuplicateKey(removePastedHeadersForDuplicate(v.text || v.content || ""));

    if(refCandidate && vRefKey && refCandidate === vRefKey) return true;
    if(bodyKey && bodyKey.length > 25 && vBodyKey && bodyKey === vBodyKey) return true;

    return false;
  }) || null;
}

function saveCurrent(stay, silent){
  try{
    if(section==="verses"){
      const item=currentItem();
      const titleEl=document.getElementById("editTitle");
      const textEl=document.getElementById("editText");

      if(item && !item.duplicateAllowed){
        const newRef=titleEl ? (titleEl.value.trim() || "Sin referencia") : (item.reference||item.title||"");
        const newText=textEl ? textEl.value : (item.text||item.content||"");
        const dup=findDuplicateVerseStrong(item.id,newRef,newText);

        if(dup){
          if(silent){
            setSaveStatus("Duplicado detectado");
            return;
          }

          const msg =
            "⚠️ Este versículo ya existe:\n\n" +
            (dup.reference || dup.title || "Sin referencia") + "\n" +
            "Categoría: " + verseCategoryLabel(dup.category) + "\n\n" +
            "Aceptar = añadir igualmente\n" +
            "Cancelar = borrar esta copia y abrir el existente";

          if(confirm(msg)){
            item.duplicateAllowed=true;
          }else{
            // En pruebas detectamos que a veces el autosave ya había creado la copia.
            // Por eso eliminamos siempre el item actual al cancelar.
            state.verses = state.verses.filter(v => v.id !== item.id);
            state.currentVerseId = dup.id;
            currentVerseCategory = dup.category || currentVerseCategory || "sin_categoria";
            saveState();
            renderList();
            renderReader();
            openReader();
            toast("Duplicado descartado");
            return;
          }
        }
      }
    }
  }catch(e){
    console.error("Detector duplicados:", e);
  }

  saveCurrentOriginal(stay, silent);

  try{
    const item=currentItem();
    if(section==="verses" && item && !silent){
      item.isNewVerse=false;
      saveState();
    }
  }catch(e){}
}

function startOfLocalDayMs(ts){
  const d = ts ? new Date(ts) : new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
}

function daysByCalendar(ts){
  if(!ts) return null;
  const today = startOfLocalDayMs(Date.now());
  const sentDay = startOfLocalDayMs(ts);
  return Math.round((today - sentDay) / 86400000);
}

function formatLastCardSentAt(ts){
  const d = daysByCalendar(ts);
  if(d === null) return "📤 Nunca enviada";
  if(d <= 0) return "📤 Enviada hoy";
  if(d === 1) return "📤 Enviada ayer";
  return "📤 Enviada hace " + d + " días";
}

function formatSentListDate(ts){
  const d = daysByCalendar(ts);
  if(d === null) return "";
  if(d <= 0) return "Enviada hoy";
  if(d === 1) return "Enviada ayer";
  return "Enviada hace " + d + " días";
}

async function shareVerseCard(){
  try{
    const item = (typeof currentItem === "function") ? currentItem() : null;

    // Marcamos la tarjeta como enviada al pulsar el botón Tarjeta.
    // Así queda registrada aunque WhatsApp no devuelva correctamente el resultado del compartir.
    if(item && typeof section !== "undefined" && section === "verses"){
      item.shared = true;
      item.lastCardSentAt = Date.now();
      if(typeof saveState === "function") saveState();
      if(typeof renderReader === "function") setTimeout(renderReader, 80);
    }

    const codeEl = document.getElementById("readerCode");
    const titleEl = document.getElementById("readerTitle");
    const textEl = document.getElementById("readerText");

    const code = codeEl ? codeEl.textContent : "";
    const ref = cleanTextBreaks((item && (item.reference || item.title)) || (titleEl ? titleEl.textContent : "Sin referencia"));
    const body = cleanTextBreaks((item && (item.text || item.content)) || (textEl ? textEl.textContent : ""));
    let category = "📖 Versículo";

    if(typeof verseCategoryLabel === "function" && item){
      category = verseCategoryLabel(item.category);
    }else if(code.includes("·")){
      category = code.split("·").pop().trim();
    }

    if(!ref || !body){
      alert("Abre primero un versículo para crear la tarjeta.");
      return;
    }

    function iconFromCategory(c){
      c=String(c||"");
      if(c.includes("❤️")) return "❤️";
      if(c.includes("🌿")) return "🌿";
      if(c.includes("✨")) return "✨";
      if(c.includes("🕊")) return "🕊️";
      if(c.includes("👑")) return "👑";
      if(c.includes("🛡")) return "🛡️";
      if(c.includes("🙏") || c.includes("Fe")) return "✝️";
      if(c.includes("Salvación")) return "❤️";
      return "📖";
    }

    function wrapText(ctx, t, x, y, maxWidth, lineHeight, maxLines){
      const words=String(t||"").replace(/\s+/g," ").trim().split(" ");
      let line="";
      let lines=[];
      for(let i=0;i<words.length;i++){
        const test=line ? line+" "+words[i] : words[i];
        if(ctx.measureText(test).width > maxWidth && line){
          lines.push(line);
          line=words[i];
          if(lines.length>=maxLines) break;
        }else{
          line=test;
        }
      }
      if(lines.length<maxLines && line) lines.push(line);
      if(words.join(" ").length > lines.join(" ").length && lines.length){
        lines[lines.length-1]=lines[lines.length-1].replace(/[.,;:]*$/,"")+"...";
      }
      lines.forEach(l=>{
        ctx.fillText(l,x,y);
        y += lineHeight;
      });
    }

    const canvas=document.createElement("canvas");
    canvas.width=1080;
    canvas.height=1920;
    const ctx=canvas.getContext("2d");

    const grad=ctx.createLinearGradient(0,0,0,1920);
    grad.addColorStop(0,"#28c3d4");
    grad.addColorStop(1,"#20b3c4");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,1080,1920);

    ctx.save();
    ctx.globalAlpha=0.08;
    ctx.font="520px Arial, sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillStyle="#ffffff";
    ctx.fillText(iconFromCategory(category),540,920);
    ctx.restore();

    ctx.textAlign="center";
    ctx.fillStyle="#ffffff";
    ctx.shadowColor="rgba(0,0,0,0.25)";
    ctx.shadowBlur=10;
    ctx.shadowOffsetY=3;

    ctx.font="italic 56px Georgia, serif";
    ctx.fillText("🌅 Versículo del día",540,355);

    ctx.font="54px Georgia, serif";
    ctx.fillText(category,540,480);

    ctx.font="bold 74px Georgia, serif";
    ctx.fillText(ref,540,645);

    const textLayout=getCardTextLayout(body);
    ctx.font="italic "+textLayout.font+"px Georgia, serif";
    wrapText(ctx,body,540,textLayout.y,930,textLayout.line,textLayout.max);

    ctx.font="34px Georgia, serif";
    ctx.globalAlpha=0.88;
    // pie eliminado
    ctx.globalAlpha=1;

    const blob = await new Promise(resolve=>canvas.toBlob(resolve,"image/png",0.95));
    if(!blob){
      alert("No se pudo crear la tarjeta.");
      return;
    }

    const file = new File([blob],"versiculo-del-dia.png",{type:"image/png"});

    if(navigator.canShare && navigator.canShare({files:[file]}) && navigator.share){
      await navigator.share({
        files:[file],
        title:"Versículo del día",
        text:category+"\n"+ref
      });
      if(item){
        item.shared=true;
        item.lastCardSentAt=Date.now();
        saveState();
        renderReader();
      }
      toast("Tarjeta compartida");
    }else{
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download="versiculo-del-dia.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
      if(item){
        item.shared=true;
        item.lastCardSentAt=Date.now();
        saveState();
        renderReader();
      }
      toast("Tarjeta descargada");
    }
  }catch(e){
    console.error(e);
    alert("Error creando la tarjeta: "+(e && e.message ? e.message : e));
  }
}



function getCurrentVerseListForSwipe(){
  try{
    if(section !== "verses" || !state || !Array.isArray(state.verses)) return [];
    if(specialVerseMode === "daily" || specialVerseMode === "random") return [];

    if(currentVerseCategory === "favoritos"){
      return state.verses.filter(v => v.favorite);
    }

    const item = currentItem();
    const cat = currentVerseCategory || (item && item.category) || "sin_categoria";
    return state.verses.filter(v => (v.category || "sin_categoria") === cat);
  }catch(e){
    return [];
  }
}

function swipeVerse(dir){
  try{
    if(section !== "verses") return;
    if(specialVerseMode === "daily" || specialVerseMode === "random") return;

    const item = currentItem();
    if(!item) return;

    const list = getCurrentVerseListForSwipe();
    if(!list || list.length <= 1) return;

    const idx = list.findIndex(v => v.id === item.id);
    if(idx < 0) return;

    const nextIdx = idx + dir;

    if(nextIdx < 0){
      if(typeof toast === "function") toast("Inicio de la categoría");
      return;
    }
    if(nextIdx >= list.length){
      if(typeof toast === "function") toast("Fin de la categoría");
      return;
    }

    state.currentVerseId = list[nextIdx].id;
    saveState();
    renderReader();

    const reader = document.getElementById("readerText") || document.getElementById("readerTitle");
    if(reader && reader.animate){
      reader.animate(
        [
          {opacity:0.35, transform:"translateX(" + (dir > 0 ? "18px" : "-18px") + ")"},
          {opacity:1, transform:"translateX(0)"}
        ],
        {duration:180, easing:"ease-out"}
      );
    }
  }catch(e){
    console.error("swipeVerse", e);
  }
}

let swipeStartX = 0;
let swipeStartY = 0;
let swipeTracking = false;

function installVerseSwipe(){
  try{
    const reader = document.getElementById("readerText");
    if(!reader || reader.dataset.swipeInstalled === "1") return;
    reader.dataset.swipeInstalled = "1";

    reader.addEventListener("touchstart", function(e){
      if(!e.touches || e.touches.length !== 1) return;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
      swipeTracking = true;
    }, {passive:true});

    reader.addEventListener("touchend", function(e){
      if(!swipeTracking || !e.changedTouches || e.changedTouches.length !== 1) return;
      swipeTracking = false;

      const dx = e.changedTouches[0].clientX - swipeStartX;
      const dy = e.changedTouches[0].clientY - swipeStartY;

      if(Math.abs(dx) < 70) return;
      if(Math.abs(dy) > 55) return;

      if(dx < 0){
        swipeVerse(1);
      }else{
        swipeVerse(-1);
      }
    }, {passive:true});
  }catch(e){}
}

setInterval(installVerseSwipe, 1000);



function getVersePositionText(){
  try{
    if(section !== "verses") return "";
    const item = currentItem();
    if(!item || !Array.isArray(state.verses)) return "";

    let list = [];
    if(currentVerseCategory === "favoritos"){
      list = state.verses.filter(v => v.favorite);
    }else{
      const cat = currentVerseCategory || item.category || "sin_categoria";
      list = state.verses.filter(v => (v.category || "sin_categoria") === cat);
    }

    const idx = list.findIndex(v => v.id === item.id);
    if(idx < 0) return "";

    return "V" + (idx + 1) + " / " + list.length;
  }catch(e){
    return "";
  }
}

function updateVersePositionCounter(){
  try{
    const existing = document.getElementById("versePositionCounter");

    if(section !== "verses"){
      if(existing) existing.remove();
      return;
    }

    const titleEl = document.getElementById("readerTitle");
    if(!titleEl) return;

    let counter = document.getElementById("versePositionCounter");
    if(!counter){
      counter = document.createElement("div");
      counter.id = "versePositionCounter";
      counter.style.opacity = "0.62";
      counter.style.fontSize = "15px";
      counter.style.margin = "8px 0 14px 0";
      counter.style.textAlign = "center";
      counter.style.width = "100%";
      counter.style.fontWeight = "600";
      titleEl.parentNode.insertBefore(counter, titleEl);
    }

    const txt = getVersePositionText();
    counter.textContent = txt || "";
  }catch(e){}
}

const oldRenderReaderForCounter = renderReader;
renderReader = function(){
  oldRenderReaderForCounter();
  setTimeout(updateVersePositionCounter, 50);
};

setInterval(updateVersePositionCounter, 1000);
